<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#bc5cff">
  <title>totally normal ditto page :3</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: "Comic Sans MS", "Trebuchet MS", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
      background: #8ed4ff;
    }

    body {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      min-height: 100dvh;
      isolation: isolate;
    }

    body::before {
      content: "";
      position: fixed;
      inset: -20vmax;
      z-index: -3;
      background:
        repeating-conic-gradient(
          from 0deg,
          #ff4fc8 0 12deg,
          #ffe66d 12deg 24deg,
          #59f5ff 24deg 36deg,
          #985cff 36deg 48deg
        );
      animation: spin 3s linear infinite;
      will-change: transform;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 8;
      pointer-events: none;
      background: rgba(255, 255, 255, 0.18);
      mix-blend-mode: overlay;
      animation: flash 0.42s steps(2, jump-none) infinite;
    }

    .tease-gate {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      overflow: hidden;
      padding: 22px;
      background: #ff49bd;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    .tease-gate::before {
      content: "";
      position: absolute;
      inset: -20%;
      z-index: 1;
      background:
        radial-gradient(circle at 18% 20%, rgba(255, 245, 80, 0.95), transparent 30%),
        radial-gradient(circle at 82% 22%, rgba(79, 239, 255, 0.95), transparent 34%),
        radial-gradient(circle at 52% 82%, rgba(176, 65, 255, 0.95), transparent 38%),
        linear-gradient(135deg, rgba(255, 57, 184, 0.88), rgba(81, 218, 255, 0.82));
      mix-blend-mode: screen;
      animation: tease-colors 3s ease-in-out infinite alternate;
    }

    .tease-gate::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      background:
        repeating-linear-gradient(
          115deg,
          rgba(255, 255, 255, 0.12) 0 2px,
          transparent 2px 11px
        );
      backdrop-filter: blur(18px);
    }

    .tease-gate.opened {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .tease-preview {
      position: absolute;
      inset: -18%;
      z-index: 0;
      width: 136%;
      height: 136%;
      object-fit: cover;
      opacity: 0.92;
      transform: scale(1.25);
      filter: blur(58px) brightness(1.9) saturate(2.8) contrast(0.72);
      animation: tease-preview-shift 4s ease-in-out infinite alternate;
    }

    .tease-card {
      position: relative;
      z-index: 3;
      width: min(92vw, 610px);
      padding: clamp(26px, 6vw, 52px);
      border: 5px solid rgba(255, 255, 255, 0.82);
      border-radius: 36px;
      color: #fff;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.24), rgba(255, 255, 255, 0.08)),
        rgba(97, 20, 133, 0.56);
      box-shadow:
        0 24px 80px rgba(70, 0, 95, 0.48),
        0 0 65px rgba(255, 255, 255, 0.45),
        inset 0 1px 0 rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(24px) saturate(1.5);
      text-align: center;
      animation: tease-card-float 1.6s ease-in-out infinite alternate;
    }

    .tease-kicker {
      display: inline-block;
      margin: 0 0 14px;
      padding: 7px 12px;
      border-radius: 999px;
      color: #5e176f;
      background: #fff269;
      font-size: clamp(0.72rem, 2vw, 0.95rem);
      font-weight: 1000;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .tease-card h1 {
      margin: 0;
      font-size: clamp(2.6rem, 10vw, 6rem);
      font-weight: 1000;
      line-height: 0.9;
      letter-spacing: -0.04em;
      text-shadow:
        4px 4px 0 #ff39ae,
        -3px -3px 0 #52ddff,
        0 0 28px rgba(255, 255, 255, 0.9);
    }

    .tease-copy {
      max-width: 440px;
      margin: 22px auto;
      font-size: clamp(1rem, 3vw, 1.35rem);
      font-weight: 800;
      line-height: 1.35;
      text-shadow: 0 2px 12px rgba(50, 0, 62, 0.5);
    }

    .tease-enter {
      display: block;
      width: 100%;
      padding: 17px 22px;
      border: 4px solid #641477;
      border-radius: 999px;
      color: #3d084b;
      background: linear-gradient(135deg, #fff46c, #ffbcf0);
      box-shadow:
        0 8px 0 #6e197f,
        0 0 28px rgba(255, 242, 105, 0.8);
      font: 1000 clamp(1.1rem, 4vw, 1.7rem) / 1 "Comic Sans MS", system-ui, sans-serif;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .tease-enter:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow:
        0 11px 0 #6e197f,
        0 0 36px rgba(255, 242, 105, 1);
    }

    .tease-enter:active {
      transform: translateY(6px);
      box-shadow: 0 2px 0 #6e197f;
    }

    @keyframes tease-colors {
      to { transform: translate3d(5%, -4%, 0) rotate(8deg) scale(1.08); }
    }

    @keyframes tease-preview-shift {
      to { transform: translate3d(-5%, 4%, 0) scale(1.42) rotate(-4deg); }
    }

    @keyframes tease-card-float {
      to { transform: translateY(-8px) rotate(0.6deg); }
    }

    .chaos {
      position: relative;
      z-index: 2;
      display: grid;
      place-items: center;
      width: min(94vw, 1100px);
      height: calc(100dvh - 92px);
      min-height: 0;
      padding: clamp(52px, 7vh, 78px) clamp(18px, 4vw, 48px);
      border: clamp(7px, 1.5vw, 16px) ridge #fff566;
      border-radius: 42px;
      background: rgba(126, 206, 255, 0.84);
      box-shadow:
        0 0 0 10px #c35bff,
        0 0 80px 26px #ff55c8,
        inset 0 0 55px rgba(255, 255, 255, 0.85);
      text-align: center;
      transform-origin: center;
      animation: card-bounce 0.72s ease-in-out infinite alternate;
    }

    .headline,
    .footer-yell {
      position: relative;
      z-index: 3;
      margin: 0;
      color: #fff;
      font-weight: 1000;
      line-height: 0.9;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      -webkit-text-stroke: clamp(1px, 0.35vw, 4px) #61157d;
      text-shadow:
        4px 4px 0 #ff3fae,
        -4px -4px 0 #52dfff,
        0 0 20px #fff;
    }

    .headline {
      max-width: 850px;
      font-size: clamp(2rem, 8vw, 6.5rem);
      animation: rainbow 0.48s linear infinite, word-wobble 0.35s ease-in-out infinite alternate;
    }

    .footer-yell {
      font-size: clamp(1.1rem, 3.8vw, 2.8rem);
      animation: rainbow 0.38s linear infinite reverse;
    }

    .click-counter {
      position: relative;
      z-index: 3;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 10px;
      padding: 9px 15px;
      border: 3px solid #67117e;
      border-radius: 999px;
      color: #23002f;
      background: #fff35c;
      box-shadow: 4px 5px 0 #a52fd0, 0 0 18px rgba(255, 243, 92, 0.75);
      font-size: clamp(0.72rem, 1.8vw, 1.1rem);
      font-weight: 1000;
      white-space: nowrap;
      transform: rotate(-1deg);
    }

    .click-counter strong {
      min-width: 2ch;
      color: #8a23c7;
      font-size: 1.18em;
    }

    .ditto-stage {
      position: relative;
      width: min(72vw, 620px);
      margin: clamp(8px, 2vh, 20px) 0;
      filter: drop-shadow(0 14px 0 #7c2b96) drop-shadow(0 0 30px #fff);
      animation: ditto-dance 0.4s steps(2, jump-none) infinite;
    }

    .ditto-stage img {
      display: block;
      width: 100%;
      height: auto;
      border: 8px solid #fff;
      border-radius: 22px;
      image-rendering: pixelated;
    }

    .floating-ditto {
      position: fixed;
      z-index: 1;
      width: clamp(90px, 16vw, 230px);
      pointer-events: none;
      image-rendering: pixelated;
      opacity: 0.78;
      filter: saturate(1.5) drop-shadow(0 0 15px #fff);
      animation: fly var(--speed) linear infinite;
      animation-delay: var(--delay);
    }

    .marquee {
      position: fixed;
      left: 0;
      right: 0;
      z-index: 6;
      overflow: hidden;
      padding: 7px 0;
      color: #23002f;
      background: #fff35c;
      border-block: 4px solid #67117e;
      font-size: clamp(1rem, 2.4vw, 1.9rem);
      font-weight: 1000;
      white-space: nowrap;
      text-transform: uppercase;
    }

    .marquee.top {
      top: 0;
      transform: rotate(-1deg);
    }

    .marquee.bottom {
      bottom: 0;
      transform: rotate(1deg);
    }

    .marquee span {
      display: inline-block;
      min-width: max-content;
      padding-left: 100%;
      animation: scroll 7s linear infinite;
    }

    .confetti {
      position: fixed;
      top: -12vh;
      z-index: 7;
      width: var(--size);
      height: calc(var(--size) * 1.8);
      border-radius: 3px;
      background: hsl(var(--hue) 100% 60%);
      pointer-events: none;
      animation: confetti-fall var(--fall) linear infinite;
      animation-delay: var(--delay);
    }

    @keyframes spin {
      to { transform: rotate(1turn); }
    }

    @keyframes flash {
      50% { opacity: 0; }
    }

    @keyframes card-bounce {
      from { transform: rotate(-1deg) scale(0.98); }
      to { transform: rotate(1deg) scale(1.03); }
    }

    @keyframes rainbow {
      to { filter: hue-rotate(1turn); }
    }

    @keyframes word-wobble {
      from { transform: skew(-3deg) rotate(-1deg); }
      to { transform: skew(3deg) rotate(1deg); }
    }

    @keyframes ditto-dance {
      0% { transform: translateY(3px) rotate(-2deg) scaleX(1.03); }
      50% { transform: translateY(-5px) rotate(2deg) scaleX(0.97); }
      100% { transform: translateY(2px) rotate(-1deg) scaleX(1.03); }
    }

    @keyframes fly {
      from { transform: translate(-30vw, 110vh) rotate(0deg); }
      to { transform: translate(125vw, -45vh) rotate(760deg); }
    }

    @keyframes scroll {
      to { transform: translateX(-100%); }
    }

    @keyframes confetti-fall {
      to { transform: translate3d(var(--drift), 125vh, 0) rotate(900deg); }
    }

    @media (max-width: 600px) {
      body::before {
        inset: -12vmax;
        animation-duration: 7s;
      }

      body::after {
        display: none;
      }

      .tease-gate::after {
        backdrop-filter: blur(8px);
      }

      .tease-preview {
        filter: blur(38px) brightness(1.65) saturate(2.2);
        animation-duration: 6s;
      }

      .tease-card {
        backdrop-filter: blur(10px) saturate(1.2);
        animation-duration: 2.4s;
      }

      .chaos {
        width: 94vw;
        height: calc(100dvh - 84px);
        min-height: 0;
        padding: 48px 14px 42px;
        border-radius: 26px;
        animation-duration: 1.2s;
        box-shadow:
          0 0 0 6px #c35bff,
          0 0 34px 10px #ff55c8,
          inset 0 0 24px rgba(255, 255, 255, 0.68);
      }

      .ditto-stage {
        width: 78vw;
        filter: drop-shadow(0 8px 0 #7c2b96) drop-shadow(0 0 14px #fff);
        animation-duration: 0.7s;
      }

      .headline {
        animation-duration: 1.8s, 0.7s;
      }

      .footer-yell {
        animation-duration: 1.8s;
      }

      .floating-ditto {
        filter: saturate(1.3) drop-shadow(0 0 7px #fff);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      body,
      body::before,
      body::after,
      .chaos,
      .headline,
      .footer-yell,
      .ditto-stage,
      .floating-ditto,
      .confetti {
        animation-duration: 1.8s;
      }
    }
  </style>
</head>
<body>
  <section id="teaseGate" class="tease-gate" aria-labelledby="teaseTitle">
    <img id="teasePreview" class="tease-preview" alt="" aria-hidden="true">
    <div class="tease-card">
      <p class="tease-kicker">Private area</p>
      <h1 id="teaseTitle">Nude Stuff</h1>
      <p class="tease-copy">Some things aren't meant to be seen in public... &gt;//&lt;</p>
      <button id="teaseEnter" class="tease-enter" type="button">Press to enter</button>
    </div>
  </section>

  <div class="marquee top"><span>YOU HAVE ENTERED THE DITTO DIMENSION ★ THERE IS NO ESCAPE ★ JUST DITTO ★&nbsp;</span></div>

  <main class="chaos" aria-label="The Ditto dimension">
    <h1 id="headline" class="headline">SURPRISE!!!</h1>
    <div class="ditto-stage">
      <img id="ditto" src="ditto.gif" alt="An animated Ditto dancing">
    </div>
    <p id="footerYell" class="footer-yell">GET DITTO'D :3</p>
    <div class="click-counter" aria-live="polite">
      <span aria-hidden="true">👀</span>
      <strong id="nudeClickCount">...</strong>
      <span>curious souls clicked</span>
    </div>
  </main>

  <div class="marquee bottom"><span>CONGRATULATIONS ★ YOU CLICKED THE TOTALLY NORMAL LINK ★ CLOSE THE TAB IF YOU DARE ★&nbsp;</span></div>


  <audio id="conga" loop preload="auto" playsinline src="Conga.mp3"></audio>

  <script>
    const audio = document.querySelector("#conga");
    const mainDitto = document.querySelector("#ditto");
    const headline = document.querySelector("#headline");
    const footerYell = document.querySelector("#footerYell");
    const nudeClickCount = document.querySelector("#nudeClickCount");
    const teaseGate = document.querySelector("#teaseGate");
    const teasePreview = document.querySelector("#teasePreview");
    const teaseEnter = document.querySelector("#teaseEnter");
    let hasEntered = false;
    let chaosDecorated = false;

    teasePreview.src = mainDitto.src;

    const headlines = [
      "SURPRISE!!!",
      "GET DITTO'D!!!",
      "ABSOLUTELY BAMBOOZLED",
      "WELCOME TO CHAOS",
      "NO THOUGHTS. ONLY DITTO."
    ];

    const footers = [
      "GET DITTO'D :3",
      "THIS WAS A PERFECTLY SAFE LINK",
      "YUUKI SENDS HER REGARDS",
      "THE CONGA NEVER ENDS",
      "CLOSE THE TAB IF YOU DARE"
    ];

    function fillTheVoidWithDittos() {
      if (chaosDecorated) return;
      chaosDecorated = true;

      const isPhone = window.matchMedia("(max-width: 600px)").matches;
      const dittoAmount = isPhone ? 4 : 14;
      const confettiAmount = isPhone ? 24 : 72;

      for (let i = 0; i < dittoAmount; i += 1) {
        const clone = mainDitto.cloneNode(false);
        clone.removeAttribute("id");
        clone.removeAttribute("alt");
        clone.setAttribute("aria-hidden", "true");
        clone.className = "floating-ditto";
        clone.style.left = `${Math.random() * 25 - 25}vw`;
        clone.style.setProperty("--speed", `${4 + Math.random() * 5}s`);
        clone.style.setProperty("--delay", `${-Math.random() * 9}s`);
        document.body.appendChild(clone);
      }

      for (let i = 0; i < confettiAmount; i += 1) {
        const bit = document.createElement("i");
        bit.className = "confetti";
        bit.style.left = `${Math.random() * 100}vw`;
        bit.style.setProperty("--size", `${5 + Math.random() * 10}px`);
        bit.style.setProperty("--hue", `${Math.random() * 360}`);
        bit.style.setProperty("--fall", `${2.5 + Math.random() * 4}s`);
        bit.style.setProperty("--delay", `${-Math.random() * 6}s`);
        bit.style.setProperty("--drift", `${-90 + Math.random() * 180}px`);
        document.body.appendChild(bit);
      }
    }

    async function setupNudeClickCounter() {
      if (!nudeClickCount) return;

      try {
        const sessionKey = "sasutendo-counted-nude-click";
        const alreadyCounted = sessionStorage.getItem(sessionKey) === "true";
        const response = await fetch("/api/nude-click", {
          method: alreadyCounted ? "GET" : "POST",
          cache: "no-store"
        });

        if (!response.ok) {
          throw new Error(`Click counter failed: ${response.status}`);
        }

        const data = await response.json();
        nudeClickCount.textContent = Number(data.clicks || 0).toLocaleString();

        if (!alreadyCounted) {
          sessionStorage.setItem(sessionKey, "true");
        }
      } catch {
        nudeClickCount.textContent = "?";
      }
    }

    async function unleashChaos() {
      try {
        audio.muted = false;
        audio.volume = 1;
        await audio.play();
      } catch {
        // Autoplay is browser-controlled; any click on the page retries it.
      }
    }

    teaseEnter.addEventListener("click", () => {
      hasEntered = true;
      teaseGate.classList.add("opened");
      unleashChaos();

      window.setTimeout(() => {
        teaseGate.remove();
        fillTheVoidWithDittos();
      }, 550);
    });

    document.addEventListener("visibilitychange", () => {
      if (hasEntered && !document.hidden && audio.paused) unleashChaos();
    });

    setInterval(() => {
      headline.textContent = headlines[Math.floor(Math.random() * headlines.length)];
      footerYell.textContent = footers[Math.floor(Math.random() * footers.length)];
    }, 1250);

    setupNudeClickCounter();
  </script>
</body>
</html>
